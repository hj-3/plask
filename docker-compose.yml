version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: enrollment
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d enrollment"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/enrollment
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_NAME: enrollment-queue
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  worker:
    build: ./worker
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/enrollment
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_NAME: enrollment-queue
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "3000:80"
    environment:
      API_BASE_URL: ""
    depends_on:
      - backend

volumes:
  postgres_data:
